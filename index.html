
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nexus | Foundation Models</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap');

        :root {
            --bg-dark: #030303;
            --bg-panel: rgba(20, 20, 20, 0.6);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-tertiary: #666666;
            --accent-glow: radial-gradient(circle at 50% 0%, rgba(70, 100, 255, 0.15), transparent 60%);
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background-image: var(--accent-glow);
            background-repeat: no-repeat;
        }

        h1, h2, h3, .brand { font-family: 'Space Grotesk', sans-serif; }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; }

        /* Header & Nav */
        header { padding: 4rem 0 2rem; border-bottom: 1px solid var(--border-subtle); }
        .hero { text-align: left; max-width: 800px; margin-bottom: 3rem; }
        .hero h1 { font-size: 4rem; font-weight: 400; letter-spacing: -0.05em; line-height: 1.1; margin-bottom: 1.5rem; }
        .hero p { font-size: 1.2rem; color: var(--text-secondary); font-weight: 300; }

        /* Controls: Search & Filters */
        .controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.5rem; margin-bottom: 3rem; padding-top: 2rem; }
        
        .search-box { flex: 1; min-width: 300px; max-width: 500px; }
        .search-box input {
            width: 100%; padding: 1rem 1.5rem;
            background: rgba(255,255,255,0.03); border: 1px solid var(--border-subtle);
            border-radius: 8px; color: var(--text-primary); font-size: 1rem;
            font-family: 'Inter', sans-serif; transition: var(--transition);
        }
        .search-box input:focus { outline: none; border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }

        .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .filter-btn {
            background: transparent; border: 1px solid var(--border-subtle);
            color: var(--text-secondary); padding: 0.6rem 1.2rem;
            border-radius: 20px; cursor: pointer; font-size: 0.9rem;
            transition: var(--transition); font-family: 'Space Grotesk', sans-serif;
        }
        .filter-btn:hover, .filter-btn.active {
            background: var(--text-primary); color: var(--bg-dark); border-color: var(--text-primary);
        }

        /* Grid Layout */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1.5rem; padding-bottom: 6rem; }

        /* Card Design */
        .card {
            background: var(--bg-panel); border: 1px solid var(--border-subtle);
            border-radius: 12px; padding: 2rem; backdrop-filter: blur(10px);
            display: flex; flex-direction: column; gap: 1.5rem;
            transition: var(--transition); cursor: crosshair;
        }
        .card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .model-name { font-size: 1.8rem; font-weight: 500; letter-spacing: -0.03em; }
        .company { font-size: 0.85rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.5rem; display: block; }
        .badge { font-size: 0.75rem; padding: 0.3rem 0.8rem; border: 1px solid var(--border-subtle); border-radius: 4px; color: var(--text-secondary); font-family: 'Space Grotesk', sans-serif; }

        .card-body p { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.6; }

        .card-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; border-top: 1px solid var(--border-subtle); padding-top: 1.5rem; margin-top: auto; }
        .meta-item { display: flex; flex-direction: column; gap: 0.3rem; }
        .meta-label { font-size: 0.7rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }
        .meta-value { font-size: 0.9rem; color: var(--text-primary); font-family: 'Space Grotesk', sans-serif; }

        .empty-state { grid-column: 1 / -1; text-align: center; padding: 5rem 0; color: var(--text-tertiary); font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; align-items: stretch; }
            .search-box { max-width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container hero">
            <h1>Neural Synthesis Directory</h1>
            <p>An interactive index of state-of-the-art artificial intelligence models. Explore parameters, context windows, and specific capabilities of the industry's leading systems.</p>
        </div>
    </header>

    <main class="container">
        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search models, companies, or capabilities...">
            </div>
            <div class="filters" id="filters">
                <button class="filter-btn active" data-filter="all">All Models</button>
                <button class="filter-btn" data-filter="llm">LLM</button>
                <button class="filter-btn" data-filter="search">Search & Reasoning</button>
                <button class="filter-btn" data-filter="code">Coding</button>
                <button class="filter-btn" data-filter="vision">Vision</button>
            </div>
        </div>

        <div class="grid" id="modelGrid"></div>
    </main>

    <script>
        const aiModels = [
            {
                name: "GPT-4o", company: "OpenAI", category: "llm", type: "Omni-Modal LLM",
                desc: "The flagship model unifying text, voice, and vision. Extremely fast inference with deep contextual understanding and advanced reasoning capabilities.",
                context: "128k tokens", params: "Undisclosed", access: "API / ChatGPT"
            },
            {
                name: "Claude 3.5 Sonnet", company: "Anthropic", category: "llm", type: "Cognitive Engine",
                desc: "Industry-leading intelligence with exceptional nuance. Excels in complex multi-step instructions, creative writing, and high-level structural analysis.",
                context: "200k tokens", params: "Undisclosed", access: "API / Claude"
            },
            {
                name: "Gemini 1.5 Pro", company: "Google DeepMind", category: "llm", type: "MoE Architecture",
                desc: "Features a massive context window capable of processing entire repositories of code, extensive documents, and hours of native video/audio streams simultaneously.",
                context: "1M - 2M tokens", params: "Undisclosed", access: "API / Vertex AI"
            },
            {
                name: "DeepSeek-V3", company: "DeepSeek", category: "code", type: "Open-Weight MoE",
                desc: "Highly efficient mixture-of-experts model disrupting the open-source space. Offers top-tier mathematical reasoning and coding proficiency at a fraction of the compute.",
                context: "64k tokens", params: "671B (37B active)", access: "Open Weights / API"
            },
            {
                name: "Perplexity Pro", company: "Perplexity AI", category: "search", type: "Answer Engine",
                desc: "Not just a raw model, but a deep-research pipeline that grounds conversational responses in real-time, cited web data for unparalleled factual accuracy.",
                context: "Dynamic", params: "Routing System", access: "Web / API"
            },
            {
                name: "Llama 3.1 405B", company: "Meta", category: "llm", type: "Open Foundation",
                desc: "The largest open-weights model to date. Rivals closed-source giants in general knowledge, steerability, and robust tool-use generation.",
                context: "128k tokens", params: "405 Billion", access: "Open Weights"
            },
            {
                name: "Midjourney v6", company: "Midjourney", category: "vision", type: "Diffusion Model",
                desc: "The absolute standard for aesthetic text-to-image synthesis. Features hyper-realistic textures, accurate typography rendering, and profound prompt comprehension.",
                context: "Text Prompts", params: "Latent Diffusion", access: "Discord / Web"
            },
            {
                name: "DeepSeek Coder V2", company: "DeepSeek", category: "code", type: "Code LLM",
                desc: "Specialized in software development, algorithm design, and debugging. Trained extensively on varied programming languages and repository structures.",
                context: "128k tokens", params: "236B (21B active)", access: "Open Weights"
            },
            {
                name: "Mistral Large 2", company: "Mistral AI", category: "llm", type: "Dense LLM",
                desc: "European-based flagship model optimized for multi-lingual tasks, strict JSON formatting, and complex logical deductions with high efficiency.",
                context: "128k tokens", params: "123 Billion", access: "API / Le Chat"
            }
        ];

        const grid = document.getElementById('modelGrid');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');
        let currentFilter = 'all';

        function renderCards(query = '') {
            grid.innerHTML = '';
            
            const filteredData = aiModels.filter(model => {
                const matchesSearch = model.name.toLowerCase().includes(query) || 
                                      model.company.toLowerCase().includes(query) || 
                                      model.desc.toLowerCase().includes(query);
                const matchesFilter = currentFilter === 'all' || model.category === currentFilter;
                return matchesSearch && matchesFilter;
            });

            if (filteredData.length === 0) {
                grid.innerHTML = `<div class="empty-state">No models found matching your criteria.</div>`;
                return;
            }

            filteredData.forEach(model => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <div class="model-name">${model.name}</div>
                            <span class="company">${model.company}</span>
                        </div>
                        <span class="badge">${model.type}</span>
                    </div>
                    <div class="card-body">
                        <p>${model.desc}</p>
                    </div>
                    <div class="card-meta">
                        <div class="meta-item">
                            <span class="meta-label">Context Window</span>
                            <span class="meta-value">${model.context}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Parameters</span>
                            <span class="meta-value">${model.params}</span>
                        </div>
                        <div class="meta-item" style="grid-column: 1 / -1; margin-top: 0.5rem;">
                            <span class="meta-label">Distribution</span>
                            <span class="meta-value">${model.access}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => {
            renderCards(e.target.value.toLowerCase());
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.getAttribute('data-filter');
                renderCards(searchInput.value.toLowerCase());
            });
        });

        // Initialize
        renderCards();
    </script>
</body>
</html>
