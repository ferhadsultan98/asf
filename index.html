<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Engine</title>
<style>
    @import url('https://cdn.jsdelivr.net/npm/geist@1.0.3/dist/fonts/geist-sans/style.css');

    :root {
        --bg: #FFFFFF;
        --fg: #000000;
        --border: #EAEAEA;
        --gray: #666666;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Geist Sans', sans-serif; }
    body { background-color: var(--bg); color: var(--fg); line-height: 1.6; display: flex; justify-content: center; min-height: 100vh; }
    
    .container { width: 100%; max-width: 1200px; padding: 2rem; display: flex; flex-direction: column; position: relative; }
    
    header { display: flex; justify-content: flex-end; padding-bottom: 2rem; }
    .ai-selector { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 0.875rem; background: var(--bg); }
    .ai-selector svg { width: 16px; height: 16px; fill: var(--fg); }
    
    .search-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 0.5s ease; }
    .search-container.active { flex: 0; justify-content: flex-start; margin-bottom: 2rem; }
    
    .search-box { position: relative; width: 100%; max-width: 600px; }
    .search-input { width: 100%; padding: 1rem 1.5rem; font-size: 1.125rem; border: 1px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--fg); transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
    .search-input:focus { outline: none; border-color: var(--fg); box-shadow: 0 0 15px rgba(0,0,0,0.08); }
    
    .workflow-status { display: none; font-size: 0.875rem; color: var(--gray); margin-top: 1rem; font-family: monospace; }
    .blinking-cursor::after { content: '|'; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    .results-container { display: none; width: 100%; opacity: 0; transition: opacity 0.5s; }
    .sources-strip { display: flex; gap: 0.75rem; margin-bottom: 2rem; overflow-x: auto; padding-bottom: 0.5rem; }
    .source-card { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.75rem; white-space: nowrap; }
    .source-card div { width: 12px; height: 12px; background: var(--fg); border-radius: 2px; }

    .layout-grid { display: grid; grid-template-columns: 1fr 300px; gap: 3rem; }
    
    .main-response { font-size: 1rem; position: relative; }
    .citation { display: inline-flex; justify-content: center; align-items: center; font-size: 0.7rem; vertical-align: super; background: var(--fg); color: var(--bg); border-radius: 50%; width: 14px; height: 14px; margin: 0 2px; cursor: pointer; position: relative; font-family: monospace; }
    
    .tooltip { visibility: hidden; width: 200px; background-color: var(--fg); color: var(--bg); text-align: left; padding: 0.5rem; border-radius: 4px; position: absolute; z-index: 1; bottom: 125%; left: 50%; margin-left: -100px; font-size: 0.75rem; opacity: 0; transition: opacity 0.2s; font-family: 'Geist Sans', sans-serif; white-space: normal;}
    .citation:hover .tooltip { visibility: visible; opacity: 1; }

    .evidence-panel { border-left: 1px solid var(--border); padding-left: 1.5rem; position: sticky; top: 2rem; height: max-content; }
    .evidence-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray); margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    .evidence-item { font-size: 0.825rem; margin-bottom: 1rem; display: flex; gap: 0.5rem; }
    .evidence-number { font-weight: bold; }

    .actions { display: flex; gap: 1rem; margin-top: 3rem; border-top: 1px solid var(--border); padding-top: 1rem; }
    .btn { padding: 0.5rem 1rem; font-size: 0.875rem; cursor: pointer; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--fg); transition: all 0.2s; }
    .btn:hover { background: var(--fg); color: var(--bg); }
</style>
</head>
<body>

<div class="container">
    <header>
        <div class="ai-selector">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2zm0 4.5l6.5 13.5h-13L12 6.5z"/></svg>
            Synthesis: Claude 3.5 & GPT-4o
        </div>
    </header>

    <div class="search-container" id="searchState">
        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="Enter research query..." autocomplete="off">
        </div>
        <div class="workflow-status" id="workflowStatus">
            <span id="workflowText"></span><span class="blinking-cursor"></span>
        </div>
    </div>

    <div class="results-container" id="resultsContainer">
        <div class="sources-strip" id="sourcesStrip">
            </div>
        <div class="layout-grid">
            <div class="main-response">
                <div id="responseContent"></div>
                <div class="actions" style="display:none;" id="actionButtons">
                    <button class="btn" onclick="copyMarkdown()">Copy as Markdown</button>
                    <button class="btn" onclick="location.reload()">Re-generate with reasoning</button>
                </div>
            </div>
            <aside class="evidence-panel">
                <div class="evidence-title">Active Citations</div>
                <div id="evidenceList"></div>
            </aside>
        </div>
    </div>
</div>

<script>
    const searchInput = document.getElementById('searchInput');
    const searchState = document.getElementById('searchState');
    const workflowStatus = document.getElementById('workflowStatus');
    const workflowText = document.getElementById('workflowText');
    const resultsContainer = document.getElementById('resultsContainer');
    const responseContent = document.getElementById('responseContent');
    const sourcesStrip = document.getElementById('sourcesStrip');
    const evidenceList = document.getElementById('evidenceList');
    const actionButtons = document.getElementById('actionButtons');

    const sourcesData = [
        { id: 1, domain: "nature.com", snippet: "Recent advancements in quantum field structures." },
        { id: 2, domain: "arxiv.org", snippet: "Algorithmic optimization for neural synthesis." },
        { id: 3, domain: "mit.edu", snippet: "Economic models of AGI integration." },
        { id: 4, domain: "bloomberg.com", snippet: "Market analysis of high-end corporate AI." }
    ];

    const responseText = "The synthesis of available data indicates a paradigm shift in corporate intelligence architecture. According to recent academic models, agentic workflows reduce operational latency by 40% [1]. Furthermore, neural optimization protocols allow for real-time data retrieval across distributed ledgers [2]. \n\nEconomic implications suggest that integrating dual-model synthesis (e.g., Claude and GPT) yields higher baseline accuracy for complex queries [3]. Market indicators confirm sustained investment in these high-end search modalities [4].";

    searchInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter' && this.value.trim() !== '') {
            startWorkflow();
        }
    });

    async function startWorkflow() {
        searchInput.disabled = true;
        workflowStatus.style.display = 'block';
        searchState.classList.add('active');

        const steps = [
            "Step 1: Planning Search Strategy...",
            "Step 2: Retrieving 12 Sources...",
            "Step 3: Synthesizing with Claude 3.5 & GPT-4o..."
        ];

        for (let step of steps) {
            workflowText.textContent = step;
            await new Promise(r => setTimeout(r, 1200));
        }

        workflowStatus.style.display = 'none';
        showResults();
    }

    function showResults() {
        resultsContainer.style.display = 'block';
        setTimeout(() => resultsContainer.style.opacity = '1', 50);

        // Generate Source Cards
        for(let i=1; i<=12; i++) {
            const domain = sourcesData[i%4].domain;
            sourcesStrip.innerHTML += `<div class="source-card"><div></div> ${domain}</div>`;
        }

        streamText();
    }

    async function streamText() {
        let currentHTML = "";
        let i = 0;
        
        while (i < responseText.length) {
            if (responseText[i] === '[' && !isNaN(responseText[i+1])) {
                const id = responseText[i+1];
                const source = sourcesData.find(s => s.id == id);
                currentHTML += `<span class="citation">${id}<span class="tooltip">${source.domain}: ${source.snippet}</span></span>`;
                addEvidence(source);
                i += 3; // skip [X]
            } else if (responseText[i] === '\n') {
                currentHTML += '<br>';
                i++;
            } else {
                currentHTML += responseText[i];
                i++;
            }
            responseContent.innerHTML = currentHTML + '<span class="blinking-cursor"></span>';
            await new Promise(r => setTimeout(r, 15));
        }
        
        responseContent.innerHTML = currentHTML; // Remove cursor
        actionButtons.style.display = 'flex';
    }

    function addEvidence(source) {
        if(!document.getElementById(`ev-${source.id}`)) {
            evidenceList.innerHTML += `
                <div class="evidence-item" id="ev-${source.id}">
                    <span class="evidence-number">[${source.id}]</span>
                    <span><strong>${source.domain}</strong><br>${source.snippet}</span>
                </div>
            `;
        }
    }

    function copyMarkdown() {
        const text = responseContent.innerText;
        navigator.clipboard.writeText(text);
        alert('Copied to clipboard');
    }
</script>
</body>
</html>
