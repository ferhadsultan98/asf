<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Directory | AI Models</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap');
        
        :root {
            --bg-base: #050505;
            --bg-surface: #111111;
            --text-main: #f5f5f5;
            --text-muted: #888888;
            --accent: #d4af37; /* Soft gold/metallic accent for premium feel */
            --accent-glow: rgba(212, 175, 55, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        header {
            padding: 8rem 0 4rem;
            text-align: center;
            background: radial-gradient(circle at 50% 0%, #1a1a1a 0%, var(--bg-base) 70%);
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 1rem;
            background: linear-gradient(180deg, #ffffff 0%, #888888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 3rem;
            font-weight: 300;
        }

        .search-wrapper {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        input {
            width: 100%;
            padding: 1.2rem 2rem;
            background: var(--bg-surface);
            border: 1px solid #222;
            border-radius: 100px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.4s ease;
        }

        input:focus {
            border-color: #444;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
        }

        input::placeholder { color: #555; }

        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            padding: 2rem 0 6rem;
        }

        .card {
            background: var(--bg-surface);
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            padding: 2.5rem;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 240px;
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 16px;
            box-shadow: inset 0 0 0 1px transparent;
            transition: box-shadow 0.4s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            background: #141414;
        }

        .card:hover::after {
            box-shadow: inset 0 0 0 1px #333;
        }

        .card-header h2 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        .card-body p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 300;
        }

        .card-footer {
            margin-top: 2rem;
            display: flex;
            align-items: center;
        }

        .tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
            color: #fff;
            background: #222;
            padding: 0.4rem 1rem;
            border-radius: 100px;
        }

        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 4rem;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            header { padding: 6rem 0 3rem; }
            .container { padding: 0 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <h1>Intelligence Index</h1>
            <p class="subtitle">A curated directory of the world's most capable foundation models. Search, compare, and integrate.</p>
            <div class="search-wrapper">
                <input type="text" id="search" placeholder="Search by model name or capability...">
            </div>
        </div>
    </header>

    <main class="container">
        <div class="models-grid" id="grid"></div>
    </main>

    <script>
        const models = [
            { name: "GPT-4o", desc: "Flagship multimodal engine. Exceptional reasoning across text, voice, and vision streams.", tag: "Multimodal" },
            { name: "Claude 3.5 Sonnet", desc: "Advanced cognitive architecture. Industry-leading performance in coding and nuanced text analysis.", tag: "Logic / Code" },
            { name: "Gemini 1.5 Pro", desc: "Massive context processing capability. Analyzes entire codebases and hours of raw video data natively.", tag: "Deep Context" },
            { name: "Midjourney v6", desc: "High-fidelity image synthesis. Unmatched adherence to complex prompts and hyper-realistic aesthetic generation.", tag: "Vision" },
            { name: "Sora", desc: "Physics-aware video generation. Creates temporally consistent, high-resolution cinematic sequences from text.", tag: "Generative Video" },
            { name: "Llama 3", desc: "Highly optimized open-weight architecture. State-of-the-art instruction following and general dialogue.", tag: "Open Source" },
            { name: "Suno v3", desc: "Parametric audio synthesis. Generates full-fidelity, structurally coherent musical compositions.", tag: "Audio" },
            { name: "Mistral Large", desc: "Efficient, top-tier reasoning model optimized for multilingual tasks and complex logical operations.", tag: "Text Engine" },
            { name: "Stable Diffusion 3", desc: "Next-generation latent diffusion model excelling in typography integration and prompt adherence.", tag: "Vision" }
        ];

        const grid = document.getElementById('grid');
        const searchInput = document.getElementById('search');

        function render(filterText = '') {
            const filtered = models.filter(m => 
                m.name.toLowerCase().includes(filterText) || 
                m.desc.toLowerCase().includes(filterText) ||
                m.tag.toLowerCase().includes(filterText)
            );

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-results">No intelligence models found matching your criteria.</div>';
                return;
            }

            grid.innerHTML = filtered.map(m => `
                <div class="card">
                    <div class="card-header">
                        <h2>${m.name}</h2>
                    </div>
                    <div class="card-body">
                        <p>${m.desc}</p>
                    </div>
                    <div class="card-footer">
                        <span class="tag">${m.tag}</span>
                    </div>
                </div>
            `).join('');
        }

        searchInput.addEventListener('input', (e) => {
            render(e.target.value.toLowerCase());
        });

        // Initial render
        render();
    </script>
</body>
</html>
